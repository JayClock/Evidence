components:
  schemas:
    AddMemberInput:
      type: object
      required:
        - user
      properties:
        role:
          type:
            - string
            - 'null'
        user:
          $ref: '#/components/schemas/RefModel'
    BTreeMap:
      type: object
      additionalProperties:
        type: object
        required:
          - href
        properties:
          href:
            type: string
      propertyNames:
        type: string
    CommitDraftInput:
      type: object
      properties:
        edges:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/EdgeInput'
        nodes:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/NodeInput'
    CommitResult:
      type: object
      required:
        - committed
      properties:
        committed:
          type: boolean
    CreateDiagramInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
    CreateLogicalEntityInput:
      type: object
      required:
        - name
        - type
      properties:
        content:
          type: string
        label:
          type:
            - string
            - 'null'
        name:
          type: string
        subType:
          type:
            - string
            - 'null'
        type:
          $ref: '#/components/schemas/LogicalEntityType'
    CreateLogicalRelationshipInput:
      type: object
      required:
        - source
        - target
      properties:
        label:
          type:
            - string
            - 'null'
        source:
          $ref: '#/components/schemas/RefModel'
        target:
          $ref: '#/components/schemas/RefModel'
    DeletedResult:
      type: object
      required:
        - deleted
      properties:
        deleted:
          type: boolean
    DiagramCollectionEmbedded:
      type: object
      required:
        - diagrams
      properties:
        diagrams:
          type: array
          items:
            $ref: '#/components/schemas/DiagramResource'
    DiagramCollectionResource:
      type: object
      required:
        - _links
        - _templates
        - _embedded
        - page
      properties:
        _embedded:
          $ref: '#/components/schemas/DiagramCollectionEmbedded'
        _links:
          $ref: '#/components/schemas/BTreeMap'
        _templates:
          $ref: '#/components/schemas/BTreeMap'
        page:
          $ref: '#/components/schemas/PageModel'
    DiagramResource:
      type: object
      required:
        - _links
        - _templates
        - id
        - title
        - viewport
        - createdAt
        - updatedAt
      properties:
        _links:
          $ref: '#/components/schemas/BTreeMap'
        _templates:
          $ref: '#/components/schemas/BTreeMap'
        createdAt:
          type: string
        id:
          type: string
        title:
          type: string
        updatedAt:
          type: string
        viewport:
          $ref: '#/components/schemas/Viewport'
    DiagramSnapshot:
      type: object
      required:
        - nodes
        - edges
        - viewport
      properties:
        edges:
          type: array
          items:
            $ref: '#/components/schemas/SnapshotEdge'
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/SnapshotNode'
        viewport:
          $ref: '#/components/schemas/Viewport'
    DiagramVersionCollectionEmbedded:
      type: object
      required:
        - versions
      properties:
        versions:
          type: array
          items:
            $ref: '#/components/schemas/DiagramVersionResource'
    DiagramVersionCollectionResource:
      type: object
      required:
