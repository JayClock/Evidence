name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 9.8.0
          run_install: false

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v5

      - run: pnpm exec nx sync:check
      - run: pnpm exec nx format:check --base=$NX_BASE --head=$NX_HEAD

      - run: pnpm exec nx affected -t format-check lint test build typecheck
      - run: pnpm exec nx affected -t lint-sqlite test-sqlite build-sqlite test-postgres
